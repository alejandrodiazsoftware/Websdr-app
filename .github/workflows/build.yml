name: Build
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with: {python-version: '3.11'}
    - run: sudo apt update && sudo apt install -y zip unzip openjdk-17-jdk git
    - run: pip install buildozer==1.5.0 cython==0.29.36 kivy==2.2.1
    - run: buildozer init && sed -i 's|title =.*|title = WebSDR|' buildozer.spec && sed -i 's|source.dir =.*|source.dir = .|' buildozer.spec && sed -i 's|android.permissions =.*|android.permissions = INTERNET|' buildozer.spec
    - run: buildozer android debug
    - uses: actions/upload-artifact@v4
      with: {name: apk, path: bin/*.apk}
